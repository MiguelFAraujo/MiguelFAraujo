name: 📊 Atualizar vitrine do perfil

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Update last-updated badge
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const readme = fs.readFileSync('README.md', 'utf8');
            const today = new Date().toLocaleDateString('pt-BR', {
              timeZone: 'America/Sao_Paulo',
              day: '2-digit',
              month: 'long',
              year: 'numeric'
            });
            const encoded = encodeURIComponent(today);
            const updated = readme.replace(
              /(?<=Last Updated.*?%C3%9Altima%20atualiza%C3%A7%C3%A3o-).*?(?=\?style)/,
              encoded
            );
            fs.writeFileSync('README.md', updated);

      - name: 📝 Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: atualiza data da vitrine [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
